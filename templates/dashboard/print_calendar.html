<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ month_label }} — Printable Calendar</title>
<style>
    * { box-sizing: border-box; }
    html, body {
        margin: 0;
        padding: 0;
        background: #ffffff;
        color: #000000;
        font-family: Georgia, 'Times New Roman', Times, serif;
    }
    .toolbar {
        text-align: center;
        padding: 1.25rem;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 0.9rem;
    }
    .toolbar a, .toolbar button {
        color: #000000;
        background: none;
        border: 1px solid #000000;
        border-radius: 4px;
        padding: 0.4rem 0.9rem;
        font-family: inherit;
        font-size: inherit;
        text-decoration: none;
        cursor: pointer;
        margin: 0 0.35rem;
    }
    .page {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 2rem 4rem;
    }
    .title {
        text-align: center;
        font-size: 4.5rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        margin: 1rem 0 0.75rem;
    }
    .rule {
        width: 160px;
        height: 3px;
        background: #000000;
        margin: 0 auto 3.5rem;
    }
    .weekdays, .week {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        text-align: center;
    }
    .weekdays {
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: 0.04em;
        margin-bottom: 2.25rem;
    }
    .week {
        margin-bottom: 2.5rem;
    }
    .day {
        display: block;
        font-size: 2.25rem;
        font-weight: 700;
        line-height: 1;
    }
    @media print {
        .no-print { display: none !important; }
        .page { padding: 0 1rem; }
        .title { margin-top: 0; }
    }
    @media screen and (max-width: 700px) {
        .title { font-size: 2.75rem; }
        .weekdays { font-size: 0.7rem; }
        .day { font-size: 1.4rem; }
    }
</style>
</head>
<body>
    <div class="toolbar no-print">
        <a href="{% url 'dashboard:redirect' %}">&larr; Back to dashboard</a>
        <button type="button" onclick="window.print()">Print</button>
    </div>
    <div class="page">
        <h1 class="title">{{ month_label }}</h1>
        <div class="rule"></div>
        <div class="weekdays">
            {% for label in weekday_labels %}<span>{{ label }}</span>{% endfor %}
        </div>
        {% for week in weeks %}
        <div class="week">
            {% for day in week %}
            <span class="day">{% if day %}{{ day }}{% endif %}</span>
            {% endfor %}
        </div>
        {% endfor %}
    </div>
</body>
</html>

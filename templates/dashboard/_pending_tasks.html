{% comment %}
Shared "Pending Tasks & Approvals" panel. Param: tasks (list of {label, count, href}).
{% endcomment %}
<div class="card">
    <h2 class="mb-4 text-lg font-bold text-slate-900 dark:text-white">Pending Tasks</h2>
    <div class="space-y-1">
        {% for task in tasks %}
        <a href="{{ task.href }}" class="flex items-center justify-between rounded-lg p-2 transition hover:bg-slate-50 dark:hover:bg-slate-800">
            <span class="text-sm font-medium text-slate-700 dark:text-slate-200">{{ task.label }}</span>
            {% if task.count %}
            <span class="badge-blue">{{ task.count }} pending</span>
            {% else %}
            <span class="badge bg-slate-100 text-slate-400 dark:bg-slate-700 dark:text-slate-500">All clear</span>
            {% endif %}
        </a>
        {% endfor %}
    </div>
</div>

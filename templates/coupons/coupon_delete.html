{% extends "base.html" %}
{% block title %}Delete coupon{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
    <div class="card">
        <h1 class="mb-2 text-xl font-bold text-slate-900 dark:text-white">Delete coupon</h1>
        <p class="mb-6 text-sm text-slate-500">Are you sure you want to delete <strong>{{ coupon.code }}</strong>? Customers will no longer be able to apply this code at checkout.</p>
        <form method="post" data-confirm="Delete this coupon permanently?" class="flex gap-3">
            {% csrf_token %}
            <button type="submit" class="btn-primary bg-red-600 hover:bg-red-700 focus:ring-red-500">Delete</button>
            <a href="{% url 'coupons:list' %}" class="btn-outline">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

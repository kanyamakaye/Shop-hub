{% extends "base.html" %}
{% block title %}Delete user{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
    <div class="card">
        <h1 class="mb-2 text-xl font-bold text-slate-900 dark:text-white">Delete user</h1>
        <p class="mb-6 text-sm text-slate-500">Are you sure you want to delete <strong>{{ target }}</strong>? This cannot be undone.</p>
        <form method="post" data-confirm="Delete this user permanently?" class="flex gap-3">
            {% csrf_token %}
            <button type="submit" class="btn-primary bg-red-600 hover:bg-red-700 focus:ring-red-500">Delete</button>
            <a href="{% url 'accounts:user_list' %}" class="btn-outline">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}

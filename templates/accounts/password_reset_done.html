{% extends "base_auth.html" %}
{% block title %}Check your email{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
    <div class="card text-center">
        <h1 class="mb-2 text-2xl font-bold text-slate-900 dark:text-white">Check your email</h1>
        <p class="text-sm text-slate-500">If an account exists with that email, we've sent a link to reset your password.</p>
        <a href="{% url 'accounts:login' %}" class="btn-primary mt-6 inline-flex">Back to login</a>
    </div>
</div>
{% endblock %}

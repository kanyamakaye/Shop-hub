{% extends "base_auth.html" %}
{% block title %}Password reset complete{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">

        <h1 class="mb-2 text-2xl font-bold text-slate-900 dark:text-white">Password updated</h1>

        <a href="{% url 'accounts:login' %}" class="btn-primary mt-6 inline-flex">Log in</a>
    </div>
</div>
{% endblock %}

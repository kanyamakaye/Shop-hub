{% comment %}Icon + label divider grouping a set of fields inside a form card. Params: icon, title.{% endcomment %}
<div class="mb-4 flex items-center gap-2 border-b border-slate-100 pb-3 dark:border-slate-700">
    <span class="flex h-7 w-7 shrink-0 items-center justify-center rounded-lg bg-brand-blue-100 text-sm dark:bg-brand-blue-900/40">{{ icon }}</span>
    <h2 class="text-sm font-bold uppercase tracking-wide text-brand-blue-700 dark:text-brand-blue-300">{{ title }}</h2>
</div>

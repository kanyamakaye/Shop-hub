{% if page_obj.has_other_pages %}
<div class="mt-4 flex items-center justify-between text-sm text-slate-500">
    <p>Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</p>
    <div class="flex gap-2">
        {% if page_obj.has_previous %}
        <a href="?{% if base_query %}{{ base_query }}&{% elif query %}q={{ query }}&{% endif %}page={{ page_obj.previous_page_number }}" class="btn-outline px-3 py-1.5">Previous</a>
        {% endif %}
        {% if page_obj.has_next %}
        <a href="?{% if base_query %}{{ base_query }}&{% elif query %}q={{ query }}&{% endif %}page={{ page_obj.next_page_number }}" class="btn-outline px-3 py-1.5">Next</a>
        {% endif %}
    </div>
</div>
{% endif %}

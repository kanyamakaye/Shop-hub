{% extends "base_auth.html" %}
{% block title %}Access denied{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
    <div class="card text-center">
        <div class="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-full bg-red-100 text-2xl dark:bg-red-900/40">🔒</div>
        <h1 class="text-xl font-bold text-slate-900 dark:text-white">Access denied</h1>
        <p class="mt-2 text-sm text-slate-500">You don't have permission to view this page. If you think this is a mistake, contact your organization admin or the ShopHub team.</p>
        <div class="mt-6 flex flex-wrap justify-center gap-3">
            <a href="{% url 'home:index' %}" class="btn-primary">Go home</a>
            <a href="{% url 'dashboard:redirect' %}" class="btn-outline">My dashboard</a>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied | ShopHub</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            color: #0f172a;
            font-family: Arial, Helvetica, sans-serif;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 460px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        }
        .icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            border-radius: 9999px;
            background: #fee2e2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        h1 { font-size: 20px; font-weight: 800; margin: 0 0 8px; }
        p { font-size: 14px; color: #64748b; line-height: 1.6; margin: 0 0 24px; }
        .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
        }
        .btn-primary { background: #1f4fe0; color: #ffffff; }
        .btn-outline { border: 1px solid #1f4fe0; color: #1f4fe0; }
        .brand { margin-bottom: 24px; font-weight: 800; color: #1f4fe0; font-size: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">ShopHub</div>
        <div class="icon">🔒</div>
        <h1>Access denied</h1>
        <p>You don't have permission to view this page. If you think this is a mistake, contact your organization admin or the ShopHub team.</p>
        <div class="actions">
            <a href="/" class="btn btn-primary">Go home</a>
            <a href="/dashboard/" class="btn btn-outline">My dashboard</a>
        </div>
    </div>
</body>
</html>
